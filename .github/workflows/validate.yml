name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-validation:
    name: Python Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort pytest pytest-asyncio homeassistant

      - name: Run pytest
        run: |
          pytest -q

      - name: Check Python syntax
        run: |
          python -m py_compile custom_components/hass_cursor_usage/*.py scripts/export_cursor_auth.py

      - name: Run ruff (linter)
        run: |
          ruff check custom_components/hass_cursor_usage/ scripts tests

      - name: Check code formatting with black
        run: |
          black --check custom_components/hass_cursor_usage/ scripts tests || (
            echo "Code formatting check failed!"
            echo ""
            echo "To fix, run:"
            echo "  python3 -m pip install black"
            echo "  black custom_components/hass_cursor_usage/"
            echo "  git add -u && git commit -m 'Format code with black'"
            echo ""
            echo "Or use the pre-commit hook (see .pre-commit-config.yaml)"
            exit 1
          )

      - name: Check import sorting with isort
        run: |
          isort --check-only custom_components/hass_cursor_usage/ scripts tests

  markdown-link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/workflows/mlc_config.json"

  manifest-validation:
    name: Validate Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          python -m json.tool custom_components/hass_cursor_usage/manifest.json > /dev/null
          echo "manifest.json is valid JSON"

      - name: Validate strings.json
        run: |
          python -m json.tool custom_components/hass_cursor_usage/strings.json >/dev/null
          echo "strings.json is valid JSON"

      - name: Validate hacs.json
        run: |
          python -m json.tool hacs.json >/dev/null
          echo "hacs.json is valid JSON"
